services:
  db:
    image: postgres:16-alpine
    container_name: playcord_db
    restart: always
    environment:
      POSTGRES_USER: playcord
      POSTGRES_PASSWORD: password
      POSTGRES_DB: playcord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/views.sql:/docker-entrypoint-initdb.d/02-views.sql
      - ./database/functions.sql:/docker-entrypoint-initdb.d/03-functions.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/04-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playcord"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playcord_network

  bot:
    build: .
    container_name: playcord_bot
    restart: unless-stopped
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      PLAYCORD_DB_TYPE: postgresql
      PLAYCORD_DB_HOST: db
      PLAYCORD_DB_PORT: "5432"
      PLAYCORD_DB_USER: playcord
      PLAYCORD_DB_PASSWORD: password
      PLAYCORD_DB_NAME: playcord
    volumes:
      - ./:/app
    # Use the Dockerfile build which installs fonts and Python deps at build time.
    command: ["python", "bot.py"]
    networks:
      - playcord_network

networks:
  playcord_network:
    driver: bridge

volumes:
  postgres_data:
