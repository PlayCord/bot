services:
  db:
    image: postgres:16-alpine
    container_name: playcord_db
    restart: always
    environment:
      POSTGRES_USER: playcord
      POSTGRES_PASSWORD: password
      POSTGRES_DB: playcord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./playcord/infrastructure/db/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./playcord/infrastructure/db/sql/views.sql:/docker-entrypoint-initdb.d/02-views.sql
      - ./playcord/infrastructure/db/sql/functions.sql:/docker-entrypoint-initdb.d/03-functions.sql
      - ./playcord/infrastructure/db/sql/seed.sql:/docker-entrypoint-initdb.d/04-seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U playcord" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playcord_network

  bot:
    build: .
    container_name: playcord_bot
    restart: unless-stopped
    # Reduce how long docker-compose waits before forcibly killing the container.
    # This makes `docker-compose down` stop the bot quickly (after 1s) instead of
    # waiting the default timeout for a graceful shutdown.
    stop_grace_period: 1s
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      PLAYCORD_DB_TYPE: postgresql
      PLAYCORD_DB_HOST: db
      PLAYCORD_DB_PORT: "5432"
      PLAYCORD_DB_USER: playcord
      PLAYCORD_DB_PASSWORD: password
      PLAYCORD_DB_NAME: playcord
    volumes:
      - ./:/app
    command: [ "python", "-m", "playcord.presentation.bot" ]
    networks:
      - playcord_network

networks:
  playcord_network:
    driver: bridge

volumes:
  postgres_data: