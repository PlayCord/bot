# Ruff configuration file
# https://docs.astral.sh/ruff/configuration/

line-length = 88
target-version = "py312"

[lint]
select = ["ALL"]
ignore = [
    # Conflicting docstring rules
    "D203",  # one-blank-line-before-class (incompatible with D211)
    "D212",  # multi-line-summary-first-line (incompatible with D213)

    # Formatter conflicts (rules that conflict with code formatters like Black or Ruff format)
    "W191",   # tab-indentation
    "E111",   # indentation-with-invalid-multiple
    "E114",   # indentation-with-invalid-multiple-comment
    "E117",   # over-indented
    "D206",   # indent-with-spaces
    "D300",   # triple-single-quotes
    "Q000",   # bad-quotes-inline-string
    "Q001",   # bad-quotes-multiline-string
    "Q002",   # bad-quotes-docstring
    "Q003",   # avoidable-escaped-quote
    "COM812", # missing-trailing-comma
    "COM819", # prohibited-trailing-comma
    "ISC001", # single-line-implicit-string-concatenation
    "ISC002", # multi-line-implicit-string-concatenation

]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "PLR2004", "D103", "D102", "D107", "PLC0415"]
"scripts/run_preview_bot.py" = ["S105", "E501"]
"playcord/display/views/**/*.py" = [
    "C901",
    "D101",
    "D102",
    "D107",
    "D401",
    "FBT001",
    "FBT002",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR2004",
]


